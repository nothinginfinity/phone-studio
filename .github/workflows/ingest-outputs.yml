# ============================================================
# ingest-outputs.yml
# PURPOSE: Auto-index all Phone Studio outputs pushed to
#          context/screenshots, context/conversations,
#          context/approvals, and context/scratch.
#
# TRIGGERS:
#   - Push to context/** (any new file from Phone Studio app)
#   - Weekly schedule (Sunday midnight PT) to catch gaps
#   - Manual dispatch (run anytime from GitHub Actions tab)
#
# RESULT:
#   - Creates/updates INDEX.md in each context/ subdirectory
#   - Lists all files newest-first with date + title
#   - Adds wiki-links so Obsidian can navigate directly
#   - Commits automatically ([skip ci] to avoid trigger loops)
# ============================================================

name: Ingest Phone Studio Outputs

on:
  push:
    paths:
      - 'context/**'
  schedule:
    - cron: '0 7 * * 0'
  workflow_dispatch:

jobs:
  index:
    name: Build context indexes
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install python-frontmatter

      - name: Build INDEX.md for each context directory
        run: python .github/scripts/build_indexes.py

      - name: Commit INDEX.md updates
        run: |
          git config user.name  "Phone Studio Bot"
          git config user.email "bot@phone-studio"
          git add context/*/INDEX.md
          if git diff --cached --quiet; then
            echo "No index changes to commit."
          else
            CHANGED=$(git diff --cached --name-only | tr '\n' ' ')
            git commit -m "auto: update indexes for $CHANGED [skip ci]"
            git push
            echo "Pushed updated indexes."
          fi
