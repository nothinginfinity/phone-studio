# ============================================================
# backup-approvals.yml
# PURPOSE: Weekly backup of context/approvals/ as a GitHub Release artifact
#          so your approved content is versioned and never lost
# SCHEDULE: Every Sunday midnight PT
# ============================================================

name: Backup Approved Content

on:
  schedule:
    - cron: '0 7 * * 0'  # Sunday midnight PT (UTC-7) = 07:00 UTC Sunday
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create backup archive
        run: |
          DATE=$(date +%Y-%m-%d)
          tar -czf "approvals-backup-$DATE.tar.gz" context/approvals/ knowledge/ docs/
          echo "BACKUP_FILE=approvals-backup-$DATE.tar.gz" >> $GITHUB_ENV
          echo "BACKUP_DATE=$DATE" >> $GITHUB_ENV

      - name: Upload backup as artifact
        uses: actions/upload-artifact@v4
        with:
          name: context-backup-${{ env.BACKUP_DATE }}
          path: ${{ env.BACKUP_FILE }}
          retention-days: 90  # Keep 90 days of backups
